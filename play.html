<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>졸업 음성 메시지</title>
<script>
/* 디버그 모드: URL에 ?debug=1 추가 시 모바일 콘솔(Eruda) 활성화
   사용 예: https://...github.io/play.html?f=...&debug=1
   화면 우측에 톱니바퀴 아이콘 → Console 탭에서 로그 확인 가능 */
(function() {
  if (location.search.indexOf('debug=1') === -1) return;
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/eruda';
  s.onload = function() { try { eruda.init(); } catch(e) {} };
  document.head.appendChild(s);
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F8FA;--card:#fff;--primary:#3182F6;--pri-lt:#5B9DF8;--pri-bg:#EBF3FE;
  --border:#E5E8EB;--border-l:#EEF1F5;--text:#191919;--sub:#4E4E4E;
  --muted:#8B95A1;--faint:#C6CAD0;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.05);
}
body{min-height:100vh;background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text);display:flex;flex-direction:column;align-items:center;padding:2.5rem 1.25rem 3rem}
@keyframes up    {from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin  {to{transform:rotate(360deg)}}
@keyframes wave  {0%,100%{height:3px;opacity:.2}50%{height:34px;opacity:.85}}
@keyframes bloom {0%{transform:scale(.75);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes ring  {0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.18);opacity:.12}}

/* ── 터치 오버레이 ── */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:linear-gradient(155deg,#EBF3FE 0%,#F7F8FA 55%,#EFF6FF 100%);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:opacity .8s ease;
}
.overlay.hiding{opacity:0;pointer-events:none}
.ov-inner{text-align:center;padding:2rem;animation:up .65s cubic-bezier(.22,1,.36,1) both}
.ov-school {font-size:23px;font-weight:700;color:var(--text);letter-spacing:-.5px;margin-bottom:.25rem}
.ov-student{font-size:14px;color:var(--primary);font-weight:500;min-height:20px;margin-bottom:.25rem}
.ov-desc   {font-size:13px;color:var(--muted);font-weight:300;margin-bottom:2.25rem}
.ring-wrap {position:relative;width:96px;height:96px;margin:0 auto 1.5rem}
.r1{position:absolute;inset:0;border-radius:50%;border:2px solid var(--primary);animation:ring 2.2s ease-in-out infinite}
.r2{position:absolute;inset:14px;border-radius:50%;border:1.5px solid var(--primary);animation:ring 2.2s ease-in-out infinite .55s}
.r-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:36px}
.ov-hint  {font-size:14px;color:var(--sub);font-weight:500;margin-bottom:.4rem;display:none}
.ov-sub   {font-size:12px;color:var(--muted);font-weight:300;display:none}
.ov-loading{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--muted);margin-top:1.25rem}
.ov-spin  {width:12px;height:12px;border:2px solid var(--faint);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}

/* ── 플레이어 ── */
.wrap{width:100%;max-width:400px;animation:up .55s cubic-bezier(.22,1,.36,1) both}
.top-header{margin-bottom:2rem}
.school-name{font-size:26px;font-weight:700;line-height:1.3;letter-spacing:-.5px;margin-bottom:.25rem}
.student-info{font-size:15px;color:var(--primary);margin-bottom:.25rem}
.page-desc{font-size:14px;color:var(--muted);font-weight:300}
.card{background:var(--card);border-radius:16px;padding:1.5rem;margin-bottom:.75rem;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:600;color:var(--sub);margin-bottom:1.25rem}
.waveform{display:flex;align-items:center;justify-content:center;gap:4px;height:44px;margin-bottom:1.375rem}
.bar{width:3px;border-radius:99px;background:var(--pri-lt);height:3px;opacity:.2}
.waveform.playing .bar{animation:wave 1.35s ease-in-out infinite}
.play-btn{width:64px;height:64px;border-radius:50%;border:none;background:var(--pri-bg);color:var(--primary);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;transition:transform .12s,box-shadow .2s,background .2s;box-shadow:0 2px 10px rgba(49,130,246,.2)}
.play-btn:hover{background:#D8EAFD;box-shadow:0 6px 20px rgba(49,130,246,.3);transform:scale(1.05)}
.play-btn:active{transform:scale(.93)}
.play-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.seek-wrap{display:none}
.seek-bar{-webkit-appearance:none;appearance:none;width:100%;height:3px;border-radius:99px;background:var(--border-l);outline:none;cursor:pointer}
.seek-bar::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--primary);border:2.5px solid var(--card);box-shadow:0 1px 6px rgba(49,130,246,.4);cursor:pointer;transition:transform .1s}
.seek-bar::-webkit-slider-thumb:active{transform:scale(1.35)}
.seek-bar::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--primary);border:2.5px solid var(--card);cursor:pointer}
.seek-time{font-size:11px;color:var(--muted);margin-top:9px;font-variant-numeric:tabular-nums}
.status{text-align:center;font-size:13px;color:var(--muted);min-height:20px;margin-bottom:1rem}
.status.err{color:#D94F4F;line-height:1.8}

/* ── 완료 화면 ── */
.done-wrap{display:none;text-align:center;padding:2rem 0;animation:fadeIn .6s ease both;width:100%;max-width:400px}
.done-icon {font-size:54px;display:block;margin-bottom:1.25rem;animation:bloom .6s cubic-bezier(.22,1,.36,1) both}
.done-title{font-size:20px;font-weight:700;margin-bottom:.5rem;letter-spacing:-.3px}
.done-msg  {font-size:14px;color:var(--muted);line-height:2.1;font-weight:300}
.done-divider{width:32px;height:1px;background:var(--border);margin:1.5rem auto}
.done-actions{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.replay-btn{display:inline-flex;align-items:center;gap:8px;padding:13px 22px;border-radius:10px;border:none;background:var(--pri-bg);color:var(--primary);font-size:14px;font-family:'Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;transition:background .2s;box-shadow:0 2px 10px rgba(49,130,246,.15)}
.replay-btn:hover{background:#D8EAFD}
.save-btn{display:inline-flex;align-items:center;gap:6px;padding:13px 22px;border-radius:10px;border:none;background:var(--primary);color:#fff;font-size:14px;font-family:'Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;transition:background .15s,transform .1s;box-shadow:0 2px 8px rgba(49,130,246,.25)}
.save-btn:hover:not(:disabled){background:var(--pri-lt)}
.save-btn:active{transform:scale(.96)}
.save-btn:disabled{opacity:.6;cursor:not-allowed}
.save-btn .bs{display:none;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.save-btn.converting .bs{display:block}
.policy-note{background:var(--pri-bg);border:1.5px solid rgba(49,130,246,.2);border-radius:12px;padding:.875rem 1.125rem;margin-top:1.25rem;display:none;animation:fadeIn .5s ease both}
.policy-note p{font-size:12.5px;color:var(--primary);font-weight:500;line-height:1.9;text-align:center}
.policy-note p strong{color:#1A6AE8;font-weight:700}
footer{margin-top:2.5rem;text-align:center;font-size:12px;color:var(--faint);letter-spacing:.3px;font-weight:300}
</style>
</head>

  <div class="ov-inner">
    <div class="ov-school"  id="ovSchool"></div>
    <div class="ov-student" id="ovStudent"></div>

      <div class="r1"></div><div class="r2"></div>

    <button id="ovRetry" style="display:none;margin-top:1rem;padding:10px 24px;border-radius:10px;border:none;background:var(--primary);color:#fff;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:500;cursor:pointer" onclick="retryLoad()">🔄 다시 시도</button>

<!-- ── 플레이어 ── -->
<div class="wrap" id="playerWrap" style="display:none">
  <div class="top-header">

    <div class="student-info" id="studentInfo"></div>

    <div class="waveform" id="wave">
      <div class="bar" style="animation-delay:.00s"></div><div class="bar" style="animation-delay:.09s"></div>

      <div class="bar" style="animation-delay:.36s"></div><div class="bar" style="animation-delay:.45s"></div>
      <div class="bar" style="animation-delay:.54s"></div><div class="bar" style="animation-delay:.45s"></div>

    </div>

  </div>
  <footer>졸업앨범 음성 메시지</footer>
</div>

  <span class="done-icon">🎓</span>
  <div class="done-title" id="doneTitle"></div>

      <span class="bs"></span>
      <span class="bt">⬇ MP3 저장</span>
    </button>
  </div>
  <div class="policy-note" id="policyNote">
    <p>⚠️ 음성 파일은 제공일로부터 <strong>1년 후 삭제</strong>됩니다.<br>위 버튼으로 지금 바로 저장해 두세요!</p>
  </div>
  <footer style="margin-top:2.5rem">졸업앨범 음성 메시지</footer>
</div>


<!-- audio element MUST be BEFORE script (DOM ready when script runs) -->
<audio id="player" style="display:none"></audio>

<script>
/* ════════════════════════════════════════════════
   BGM — 엘가 사랑의 인사 (Salut d'Amour, Op.12)
   MP3 파일 기반 재생 · 저작권 없는 연주 녹음
════════════════════════════════════════════════ */
const BGM = (() => {
  const TARGET_VOL = 0.22; // 목소리가 메인이므로 BGM은 배경 수준 (~22%)
  const BGM_SRC    = './bgm_salut.mp3?v=20260508';

  /* ══════════════════════════════════════════════
     v3 — Web Audio API 통합 기반
     (audio element 완전 제거 → 안드로이드 호환성 확보)

     • 라이브 재생  : AudioContext + BufferSource + GainNode
     • 오프라인 렌더 : OfflineAudioContext (저장용)
     • pause/resume : AudioContext.suspend/resume
     • 동일한 디코딩된 AudioBuffer를 양쪽에서 공유 → 효율적
  ══════════════════════════════════════════════ */

  // ── 디코딩 캐시 ──
  let bgmArrayBuffer  = null;
  let bgmDecoded      = null;
  let bgmFetchError   = null;
  let bgmDecodeError  = null;
  let decodingPromise = null;

  // ── 라이브 재생 상태 ──
  let liveCtx    = null; // AudioContext (한 번만 생성, 재사용)
  let liveSource = null; // BufferSource (start/restart마다 재생성)
  let liveGain   = null; // 볼륨 컨트롤
  let liveStarted = false; // 한 번이라도 재생됐는지 (resume 분기용)

  function decodeCompat(ctx, arrayBuffer) {
    // Promise + 콜백 두 형식 모두 지원 (구형 iOS Safari 호환)
    // Safari는 디코딩 실패 시 null을 던지는 알려진 버그가 있어서 정규화
    return new Promise(function(resolve, reject) {
      var safeReject = function(err) {
        reject(err instanceof Error ? err : new Error(
          err === null ? 'iOS Safari 디코딩 실패 (파일 형식 호환성 문제)' : String(err)
        ));
      };
      try {
        var ret = ctx.decodeAudioData(arrayBuffer, resolve, safeReject);
        if (ret && typeof ret.then === 'function') ret.then(resolve, safeReject);
      } catch(e) { safeReject(e); }
    });
  }

  /* 1단계: ArrayBuffer fetch — 페이지 로드 시 즉시 시작 */
  fetch(BGM_SRC)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status + ' (파일 경로/업로드 확인)');
      return r.arrayBuffer();
    })
    .then(function(ab) {
      if (ab.byteLength < 1000) throw new Error('파일 크기 비정상: ' + ab.byteLength + ' bytes');
      bgmArrayBuffer = ab;
      console.log('[BGM fetch 완료]', (ab.byteLength / 1024).toFixed(0) + 'KB');
    })
    .catch(function(e) {
      bgmFetchError = e;
      console.error('[BGM fetch 실패]', e);
    });

  /* 2단계: 디코딩 — 사용자 제스처 이후 호출 (BGM.start에서 트리거) */
  function ensureDecoded() {
    if (bgmDecoded)     return Promise.resolve(bgmDecoded);
    if (bgmDecodeError) return Promise.reject(bgmDecodeError);
    if (decodingPromise) return decodingPromise;

    decodingPromise = (async function() {
      // ArrayBuffer 도착 대기 (최대 30초)
      var start = Date.now();
      while (!bgmArrayBuffer) {
        if (bgmFetchError) throw bgmFetchError;
        if (Date.now() - start > 30000) throw new Error('BGM 다운로드 시간 초과');
        await new Promise(function(r) { setTimeout(r, 100); });
      }

      var AC  = window.AudioContext || window.webkitAudioContext;
      var ctx = new AC();
      try {
        if (ctx.state === 'suspended') { try { await ctx.resume(); } catch(e) {} }
        var buf = await decodeCompat(ctx, bgmArrayBuffer.slice(0));
        bgmDecoded = buf;
        console.log('[BGM 디코딩 완료]', buf.duration.toFixed(1) + 's, ' + buf.sampleRate + 'Hz');
        return buf;
      } catch(e) {
        bgmDecodeError = e;
        throw e;
      } finally {
        try { await ctx.close(); } catch(e) {}
      }
    })();

    return decodingPromise;
  }

  /* 라이브 재생용 AudioContext 보장 (사용자 제스처 안에서 호출 필수) */
  function ensureLiveCtx() {
    if (!liveCtx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      liveCtx  = new AC();
      liveGain = liveCtx.createGain();
      liveGain.gain.value = 0;
      liveGain.connect(liveCtx.destination);
    }
    // 사용자 제스처 시점에 resume 호출 (iOS/Android 자동재생 정책 우회)
    if (liveCtx.state === 'suspended') {
      liveCtx.resume().catch(function(e) {
        console.warn('[BGM ctx resume 실패]', e && e.message);
      });
    }
    return liveCtx;
  }

  function rampGain(target, durationSec) {
    if (!liveCtx || !liveGain) return;
    var now = liveCtx.currentTime;
    try {
      liveGain.gain.cancelScheduledValues(now);
      liveGain.gain.setValueAtTime(liveGain.gain.value, now);
      liveGain.gain.linearRampToValueAtTime(target, now + durationSec);
    } catch(e) { /* 일부 환경에서 cancelScheduledValues 미지원 */ }
  }

  function startNewSource(buf) {
    // BufferSource는 일회성이므로 매번 재생성
    if (liveSource) {
      try { liveSource.stop(); } catch(e) {}
      try { liveSource.disconnect(); } catch(e) {}
    }
    liveSource = liveCtx.createBufferSource();
    liveSource.buffer = buf;
    liveSource.loop   = true;
    liveSource.connect(liveGain);
    try {
      liveSource.start(0);
      liveStarted = true;
      console.log('[BGM 재생 시작]');
    } catch(e) {
      console.warn('[BGM source.start 실패]', e && e.message);
    }
  }

  return {
    start: function() {
      // 동기: 사용자 제스처 안에서 ctx 생성 + resume 트리거 (자동재생 정책 통과)
      ensureLiveCtx();

      // 비동기: 디코딩 완료 후 재생 시작 (게이트 통과 후라 시점 무관)
      ensureDecoded()
        .then(function(buf) {
          startNewSource(buf);
          rampGain(TARGET_VOL, 2.5); // 부드러운 페이드인
        })
        .catch(function(e) {
          var msg = (e && e.message) ? e.message : String(e);
          console.warn('[BGM start 실패]', msg);
        });
    },

    fadeOut: function(dur) {
      if (typeof dur !== 'number') dur = 2.5;
      rampGain(0, dur);
    },

    restart: function() {
      ensureLiveCtx();
      ensureDecoded()
        .then(function(buf) {
          // 게인 즉시 0으로 리셋
          if (liveGain && liveCtx) {
            try {
              liveGain.gain.cancelScheduledValues(liveCtx.currentTime);
              liveGain.gain.setValueAtTime(0, liveCtx.currentTime);
            } catch(e) {}
          }
          startNewSource(buf);
          rampGain(TARGET_VOL, 0.5); // 빠른 페이드인
        })
        .catch(function(e) {
          console.warn('[BGM restart 실패]', e && e.message);
        });
    },

    pause: function() {
      // AudioContext 자체를 suspend → 모든 노드 일시정지 (효율적)
      if (liveCtx && liveCtx.state === 'running') {
        liveCtx.suspend().catch(function() {});
      }
    },

    resume: function() {
      if (liveCtx && liveCtx.state === 'suspended' && liveStarted) {
        liveCtx.resume()
          .then(function() {
            // 일시정지 시 게인이 0이었을 수도 있으니 복구
            rampGain(TARGET_VOL, 0.3);
          })
          .catch(function() {});
      }
    },

    /* ── 오프라인 렌더링 (저장용) ── */
    async renderBGM(duration, sampleRate) {
      const decoded = await ensureDecoded();
      const sr  = sampleRate || 44100;
      const oac = new OfflineAudioContext(2, Math.ceil(duration * sr), sr);
      const src = oac.createBufferSource();
      src.buffer = decoded;
      src.loop   = true;
      const gain = oac.createGain();
      gain.gain.value = TARGET_VOL;
      src.connect(gain);
      gain.connect(oac.destination);
      src.start(0);
      src.stop(duration);
      return oac.startRendering();
    }
  };
})();

/* ════════════════════════════════════ */

const GAS_URL = 'https://script.google.com/macros/s/AKfycbxCIUMBHvu0YU77z4ULqrZAez6bue3cWi7Fzyg5slz-FdIY05K1EclHCRDUdcBoxXbPuQ/exec';
const fileId  = new URLSearchParams(location.search).get('f') || '';

const overlay    = document.getElementById('overlay');
const ovSchool   = document.getElementById('ovSchool');
const ovStudent  = document.getElementById('ovStudent');
const ovHint     = document.getElementById('ovHint');
const ovLoading  = document.getElementById('ovLoading');
const schoolName = document.getElementById('schoolName');
const studentInfo= document.getElementById('studentInfo');
const player     = document.getElementById('player');
const wave       = document.getElementById('wave');
const playBtn    = document.getElementById('playBtn');
const statusMsg  = document.getElementById('statusMsg');
const seekWrap   = document.getElementById('seekWrap');
const seekBar    = document.getElementById('seekBar');
const timeCurrent= document.getElementById('timeCurrent');
const timeTotal  = document.getElementById('timeTotal');
const playerWrap = document.getElementById('playerWrap');
const doneWrap   = document.getElementById('doneWrap');
const doneTitle  = document.getElementById('doneTitle');
const doneMsg    = document.getElementById('doneMsg');
const saveBtn    = document.getElementById('saveBtn');
const policyNote = document.getElementById('policyNote');

let verifiedName='', verifiedSchool='', rawBlob=null, audioMime='audio/webm';
let audioReady=false, userTouched=false, dlEnabled=true;

/* ── 잘못된 URL ── */
if (!fileId) {
  ovLoading.style.display = 'none';
  ovSchool.textContent    = '잘못된 QR코드';
  ovStudent.textContent   = '올바른 QR코드를 스캔해 주세요';
} else {
  loadAudio();
}

/* ── 타임아웃 fetch 헬퍼 ── */
async function fetchWithTimeout(url, ms) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), ms);
  try {
    const res = await fetch(url, { signal: ctrl.signal });
    clearTimeout(tid);
    return res;
  } catch(e) {
    clearTimeout(tid);
    throw e;
  }
}

/* ── 학생 정보 UI 업데이트 ── */
function applyInfo(school, name, cls, dl) {
  verifiedName   = name   || '';
  verifiedSchool = school || '';
  dlEnabled      = (dl !== false);
  const nameDisp = [cls, name].filter(Boolean).join(' · ');
  ovSchool.textContent    = school   || '졸업앨범';
  ovStudent.textContent   = nameDisp || '';
  schoolName.textContent  = school   || '졸업앨범';
  studentInfo.textContent = nameDisp || '';
}

/* ════════════════════════════════════════════
   오디오 로딩 — action=audio 에서 b64 직접 수신 후 Blob URL 변환
   (Drive 직접 스트림 불필요 — GAS가 b64로 반환)
════════════════════════════════════════════ */

async function loadAudio() {
  audioReady = false;
  try {
    ovLoading.innerHTML = '<span class="ov-spin"></span>음성 정보 확인 중…';

    const res  = await fetchWithTimeout(
      GAS_URL + '?action=audio&f=' + encodeURIComponent(fileId), 30000
    );
    const data = await res.json();
    if (!data || !data.ok)
      throw new Error((data && data.error) || '파일 정보를 불러올 수 없습니다');

    applyInfo(data.school, data.name, data.className, data.downloadEnabled);

    ovLoading.innerHTML = '<span class="ov-spin"></span>음성 준비 중…';

    // b64 → Blob URL 변환
    const mime   = data.mime || 'audio/webm';
    const binary = atob(data.b64);
    const bytes  = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    rawBlob   = new Blob([bytes], { type: mime });
    audioMime = mime;

    // 기존 ObjectURL 해제 후 새로 세팅
    if (player.src && player.src.startsWith('blob:')) {
      URL.revokeObjectURL(player.src);
    }
    player.src = URL.createObjectURL(rawBlob);
    player.load();

  } catch(err) {
    console.error('[loadAudio]', err);
    ovLoading.style.display = 'none';
    const isTimeout = err.name === 'AbortError';
    ovSchool.textContent  = isTimeout ? '연결 시간 초과' : '불러오기 실패';
    ovStudent.textContent = isTimeout
      ? '네트워크를 확인하고 다시 시도해 주세요'
      : (err.message || '잠시 후 다시 시도해 주세요');
    document.getElementById('ovRetry').style.display = 'block';
  }
}

function retryLoad() {
  document.getElementById('ovRetry').style.display = 'none';
  ovLoading.innerHTML     = '<span class="ov-spin"></span>불러오는 중…';
  ovLoading.style.display = 'flex';
  ovSchool.textContent    = '';
  ovStudent.textContent   = '';
  ovHint.style.display    = 'none';
  rawBlob    = null;
  audioReady = false;
  loadAudio();
}

/* ── canplay: 오디오 준비 완료 ── */
player.addEventListener('canplay', () => {
  if (audioReady) return; // 중복 호출 방지 (재시도 시에도 안전)
  console.log('[canplay] audio ready');
  audioReady             = true;
  seekWrap.style.display = 'block';
  playBtn.disabled       = false;
  ovLoading.style.display = 'none';
  ovHint.style.display    = 'block';
  updateSeekColor(0);
  if (userTouched) beginPlay();
});

/* ── audio error: 로딩 실패 시 에러 표시 ── */
player.addEventListener('error', (e) => {
  console.error('[player error]', player.error);
  if (!audioReady) {
    ovLoading.style.display = 'none';
    ovSchool.textContent    = '재생 준비 실패';
    ovStudent.textContent   = '새로고침 후 다시 시도해 주세요';
    document.getElementById('ovRetry').style.display = 'block';
  }
});

/* ── 오버레이 터치 ── */
function startPlayback() {
  if (userTouched) return;
  userTouched = true;

  /* BGM은 반드시 유저 제스처 시점에 시작 ─ Android·iOS 모두 정식 작동
     (음성이 아직 로딩 중이어도 BGM은 즉시 재생, 음성은 canplay에서 이어 시작) */
  BGM.start();

  overlay.classList.add('hiding');
  setTimeout(() => {
    overlay.style.display  = 'none';
    playerWrap.style.display = 'block';
  }, 800);

  // 음성은 준비됐을 때만 재생 (아니면 canplay 이벤트에서 처리)
  if (audioReady) player.play().catch(() => {});
}

function beginPlay() {
  /* canplay에서 호출 ─ BGM은 이미 startPlayback의 유저 제스처 안에서 시작됨 */
  player.play().catch(() => {});
}

/* ── 재생 컨트롤 ── */
function togglePlay() {
  if (player.paused) player.play(); else player.pause();
}
function fmt(s) {
  if (!s || isNaN(s) || !isFinite(s)) return '0:00';
  return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
}
function updateSeekColor(pct) {
  seekBar.style.background = `linear-gradient(to right,var(--primary) ${pct}%,var(--border-l) ${pct}%)`;
}

/* ── WebM/Opus duration 보정 (안드로이드 녹음 파일의 length 메타 누락 대응) ──
   안드로이드는 MediaRecorder가 webm/opus로 녹음하는데, 이 형식은 파일 헤더에
   재생 길이(duration)가 적혀있지 않음. 그래서 player.duration이 Infinity가 되어
   슬라이더가 안 움직임 → 끝까지 재생 후에야 갑자기 점프.
   해결: seek to far future → 브라우저가 강제로 실제 길이를 계산하게 만듦 */
let durationFixed = false;
player.addEventListener('loadedmetadata', function() {
  if (!isFinite(player.duration) && !durationFixed) {
    durationFixed = true;
    try { player.currentTime = 1e7; } catch(e) {} // 매우 큰 값으로 seek
  }
});
player.addEventListener('durationchange', function() {
  if (isFinite(player.duration)) {
    if (durationFixed) {
      // 진짜 length가 계산됐으니 처음으로 되돌리기
      try { player.currentTime = 0; } catch(e) {}
      durationFixed = false;
    }
    timeTotal.textContent = fmt(player.duration);
  }
});

player.addEventListener('timeupdate', function() {
  // duration이 Infinity여도 timeCurrent는 표시 (사용자 피드백)
  timeCurrent.textContent = fmt(player.currentTime);
  if (!player.duration || !isFinite(player.duration)) return;
  var pct = (player.currentTime / player.duration) * 100;
  if (!isSeeking) { seekBar.value = pct; updateSeekColor(pct); }
});

let isSeeking = false;
seekBar.addEventListener('mousedown',  () => { isSeeking=true; });
seekBar.addEventListener('touchstart', () => { isSeeking=true; }, {passive:true});
seekBar.addEventListener('input',  () => {
  updateSeekColor(parseFloat(seekBar.value));
  timeCurrent.textContent = fmt((parseFloat(seekBar.value)/100) * player.duration);
});
seekBar.addEventListener('change', () => { player.currentTime=(seekBar.value/100)*player.duration; isSeeking=false; });

player.addEventListener('play',  () => { wave.className='waveform playing'; playBtn.textContent='■'; statusMsg.textContent='재생 중…'; BGM.resume(); });
player.addEventListener('pause', () => { wave.className='waveform'; playBtn.textContent='▶'; statusMsg.textContent=''; BGM.pause(); });
player.addEventListener('error', () => {
  if (audioReady) { statusMsg.className='status err'; statusMsg.textContent='음성 재생 중 오류가 발생했습니다.'; playBtn.disabled=true; }
});

/* ── 재생 종료 → 완료 화면 ── */
player.addEventListener('ended', () => {
  wave.className = 'waveform'; playBtn.textContent = '▶'; updateSeekColor(100);
  BGM.fadeOut(3);
  setTimeout(() => {
    playerWrap.style.display = 'none';
    doneWrap.style.display   = 'block';
    doneTitle.textContent    = (verifiedName || '학생') + '님의 메시지를 들었어요';
    doneMsg.innerHTML        = '소중한 목소리를 간직해 주셔서 감사합니다.<br>졸업을 진심으로 축하드립니다 🌸';
    if (dlEnabled) {
      saveBtn.style.display    = 'inline-flex';
      policyNote.style.display = 'block';
    }
  }, 600);
});

/* ── 다시 듣기 ── */
function replayAudio() {
  doneWrap.style.display   = 'none';
  playerWrap.style.display = 'block';
  seekBar.value = 0; updateSeekColor(0);
  timeCurrent.textContent = '0:00';
  player.currentTime = 0;
  BGM.restart();
  player.play();
}

/* ══════════════════════════════════════
   MP3 다운로드
   iOS / Android → Web Share API (카카오·문자 등 공유 가능)
   기타           → blob anchor 직접 다운로드
══════════════════════════════════════ */

/* ── 디바이스 감지 ──
   Android Chrome의 decodeAudioData는 webm/opus를 디코딩하지 못해 hang하지만,
   m4a/AAC는 정상 처리 가능. 또한 Android는 변환에 5초+ 걸리면 사용자 제스처가
   만료되어 anchor 다운로드가 조용히 차단됨 → 2단계 UX로 우회 */
const isAndroid = /Android/i.test(navigator.userAgent);

// 변환 결과 캐시 — 첫 클릭에 변환, 두 번째 클릭에 다운로드 (제스처 fresh 유지)
let preparedFile = null; // { blob, filename, mime, savedAsRaw, bgmFailed }

async function downloadMp3() {
  // ───── 두 번째 클릭: 100% 동기 처리로 사용자 제스처 보존 ─────
  if (preparedFile) {
    triggerDownloadSync(preparedFile.blob, preparedFile.filename, preparedFile.mime);
    return;
  }

  // ───── 첫 번째 클릭: 변환 수행 ─────
  saveBtn.disabled = true;
  saveBtn.classList.add('converting');
  try {
    /* rawBlob은 loadAudio()에서 이미 세팅됨 — 없으면 페이지 새로고침 필요 */
    if (!rawBlob) {
      throw new Error('음성 데이터가 없습니다.\n페이지를 새로고침 후 다시 시도해 주세요.');
    }

    let finalBlob, fileExt, fileMime;
    let bgmFailed = false;
    let savedAsRaw = false;

    /* ── 입력 형식 기반 분기 ──
       Android + webm/opus 조합만 위험 → BGM 합성 건너뛰기
       그 외 (Android + m4a, iOS, PC 등 모두) → MP3 + BGM 합성 시도 */
    const inMime = (rawBlob.type || '').toLowerCase();
    const isWebmInput = inMime.indexOf('webm') !== -1 || inMime.indexOf('opus') !== -1;
    const skipConversion = isAndroid && isWebmInput;

    if (skipConversion) {
      saveBtn.querySelector('.bt').textContent = '준비 중…';
      savedAsRaw = true;
      finalBlob  = rawBlob;
      fileMime   = inMime;
      if      (inMime.indexOf('mp4') !== -1 || inMime.indexOf('m4a') !== -1) fileExt = 'm4a';
      else if (inMime.indexOf('ogg') !== -1)                                  fileExt = 'ogg';
      else                                                                    fileExt = 'webm';
    } else {
      saveBtn.querySelector('.bt').textContent = 'BGM 합성 중…';
      try {
        const result = await Promise.race([
          mixAndConvertToMp3(rawBlob),
          new Promise(function(_, reject) {
            setTimeout(function() { reject(new Error('MP3 변환 시간 초과 (30초)')); }, 30000);
          })
        ]);
        finalBlob = result.blob;
        fileExt   = 'mp3';
        fileMime  = 'audio/mpeg';
        bgmFailed = result.bgmFailed;
      } catch(convErr) {
        console.warn('[MP3 변환 실패 → 원본 음성 파일로 저장]', convErr && convErr.message);
        savedAsRaw = true;
        finalBlob  = rawBlob;
        fileMime   = inMime || 'audio/webm';
        if      (fileMime.indexOf('mp4') !== -1 || fileMime.indexOf('m4a') !== -1) fileExt = 'm4a';
        else if (fileMime.indexOf('ogg') !== -1)                                    fileExt = 'ogg';
        else                                                                        fileExt = 'webm';
      }
    }

    const filename = (verifiedName || '학생') + '_졸업메시지.' + fileExt;

    // 변환 결과를 캐시
    preparedFile = { blob: finalBlob, filename: filename, mime: fileMime, savedAsRaw: savedAsRaw, bgmFailed: bgmFailed };

    /* iOS/PC는 첫 클릭의 제스처가 아직 살아있어서 바로 다운로드 가능
       Android는 5초+ 걸린 경우 제스처 만료됐을 수 있어서 사용자가 한 번 더 클릭하게 안내 */
    if (!isAndroid) {
      // 즉시 다운로드 시도 (iOS·PC는 거의 항상 성공) — 동기 호출
      triggerDownloadSync(finalBlob, filename, fileMime);
    }

    // 버튼을 "다시 받기" 모드로 변경 — 안드로이드 첫 클릭 차단됐을 시 재시도용
    // (iOS·PC는 이미 받았지만, 한 번 더 받고 싶을 때 사용 가능)
    saveBtn.querySelector('.bt').textContent = isAndroid ? '📥 다운로드 받기' : '✓ 다시 받기';

    /* 안내 메시지 */
    if (savedAsRaw && !isAndroid) {
      setTimeout(function() {
        alert('MP3 변환이 어려워 원본 음성 파일로 저장됐어요.\n파일은 정상 재생됩니다.');
      }, 300);
    } else if (bgmFailed) {
      setTimeout(function() {
        alert('저장이 완료되었습니다.\nBGM은 합성되지 않아 음성만 저장됐어요.');
      }, 300);
    }
  } catch(err) {
    const msg = (err && err.message) ? err.message : String(err);
    alert('저장 중 오류가 발생했습니다.\n' + msg);
    saveBtn.querySelector('.bt').textContent = '⬇ MP3 저장';
  } finally {
    saveBtn.disabled = false;
    saveBtn.classList.remove('converting');
  }
}

/* 실제 다운로드 트리거 — 100% 동기 함수로 사용자 제스처 보존
   navigator.share와 anchor.click 모두 동기적으로 호출됨 (await 사용 X)
   share Promise는 fire-and-forget (제스처는 share() 호출 시점에 share sheet로 전달됨) */
function triggerDownloadSync(blob, filename, mime) {
  // 안드로이드는 anchor 다운로드를 우선 시도 (Web Share share sheet 띄우면 추가 클릭 필요해 번거로움)
  // iOS는 Web Share가 표준 흐름이라 share 우선
  if (!isAndroid && navigator.share) {
    try {
      const file = new File([blob], filename, { type: mime });
      if (!navigator.canShare || navigator.canShare({ files:[file] })) {
        // fire-and-forget: 제스처는 share() 호출 즉시 share sheet에 전달됨
        navigator.share({ files:[file], title: filename }).catch(function(e) {
          console.warn('[share canceled/failed]', e && e.message);
          anchorDownload(blob, filename); // share 실패 시 anchor fallback
        });
        return;
      }
    } catch(e) { /* fall through to anchor */ }
  }
  anchorDownload(blob, filename);
}

function anchorDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a   = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.target = '_blank'; // 일부 안드로이드 브라우저가 download 속성을 무시할 때 새 탭으로 열어 다운로드 가능
  a.rel = 'noopener';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 10000);
}

/* ── 음성 + BGM 합성 후 MP3 인코딩 ── */
async function mixAndConvertToMp3(blob) {
  const arrayBuffer = await blob.arrayBuffer();
  const AudioCtx    = window.AudioContext || window.webkitAudioContext;
  const ctx         = new AudioCtx();
  const voiceBuffer = await ctx.decodeAudioData(arrayBuffer);
  await ctx.close(); // AudioContext 완전히 해제 후 renderBGM 진행 (모바일 동시 생성 수 제한 방지)

  const duration   = voiceBuffer.duration;
  const sampleRate = voiceBuffer.sampleRate;

  /* BGM 오프라인 렌더링 — 실패 시 음성만 저장으로 fallback */
  let bgmBuffer    = null;
  let bgmFailed    = false;
  try {
    bgmBuffer = await BGM.renderBGM(duration, sampleRate);
  } catch(e) {
    bgmFailed = true;
    const msg = (e && e.message) ? e.message : String(e);
    console.warn('[BGM render 실패 → 음성만 저장]', msg);
  }

  /* 채널 데이터 추출 */
  const voiceL = voiceBuffer.getChannelData(0);
  const voiceR = voiceBuffer.numberOfChannels > 1 ? voiceBuffer.getChannelData(1) : voiceL;
  const empty  = new Float32Array(voiceBuffer.length);
  const bgmL   = bgmBuffer ? bgmBuffer.getChannelData(0) : empty;
  const bgmR   = bgmBuffer && bgmBuffer.numberOfChannels > 1 ? bgmBuffer.getChannelData(1) : bgmL;

  /* 믹싱: 음성 100% + BGM 35% (클리핑 방지) */
  const len    = voiceBuffer.length;
  const mixedL = new Float32Array(len);
  const mixedR = new Float32Array(len);
  const BGM_GAIN = .35;
  for (let i = 0; i < len; i++) {
    mixedL[i] = Math.max(-1, Math.min(1, voiceL[i] + (bgmL[i] || 0) * BGM_GAIN));
    mixedR[i] = Math.max(-1, Math.min(1, voiceR[i] + (bgmR[i] || 0) * BGM_GAIN));
  }

  /* MP3 인코딩 (stereo 128kbps) */
  const encoder = new lamejs.Mp3Encoder(2, sampleRate, 128);
  const toI16   = f32 => {
    const i16 = new Int16Array(f32.length);
    for (let i = 0; i < f32.length; i++) i16[i] = Math.max(-32768, Math.min(32767, Math.round(f32[i]*32767)));
    return i16;
  };
  const lI16 = toI16(mixedL);
  const rI16 = toI16(mixedR);
  const parts = [], BLOCK = 1152;
  for (let i = 0; i < lI16.length; i += BLOCK) {
    const buf = encoder.encodeBuffer(lI16.subarray(i,i+BLOCK), rI16.subarray(i,i+BLOCK));
    if (buf.length > 0) parts.push(new Uint8Array(buf));
  }
  const flush = encoder.flush();
  if (flush.length > 0) parts.push(new Uint8Array(flush));
  return { blob: new Blob(parts, { type:'audio/mpeg' }), bgmFailed };
}
