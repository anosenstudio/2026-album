<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>졸업 메시지</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a96e;--bg:#0f0e0d;
  --border:#2a2720;--text:#f0ece4;--muted:#8a7f6e;--faint:#3a3428;
}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text);padding:2rem 1.5rem}
.wrap{width:100%;max-width:360px;text-align:center;animation:up .5s ease both}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.cap{font-size:52px;margin-bottom:1.5rem;display:block}
.name{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:600;letter-spacing:-.5px;margin-bottom:.4rem;line-height:1.3;min-height:34px}
.cls{font-size:13px;color:var(--muted);font-weight:300;margin-bottom:2.5rem;min-height:20px}
.waveform{display:flex;align-items:center;justify-content:center;gap:4px;height:52px;margin-bottom:2rem}
.bar{width:3px;border-radius:99px;background:var(--gold);height:4px;opacity:.2}
.waveform.playing .bar{animation:wave 1.2s ease-in-out infinite;opacity:1}
@keyframes wave{0%,100%{height:4px;opacity:.3}50%{height:38px;opacity:1}}

/* 재생 버튼 */
.play-btn{width:64px;height:64px;border-radius:50%;border:1px solid var(--border);background:#1e1c18;color:var(--gold);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;transition:border-color .2s,transform .12s}
.play-btn:hover{border-color:var(--gold);transform:scale(1.05)}
.play-btn:active{transform:scale(.95)}
.play-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* 로딩 */
.loading{font-size:13px;color:var(--muted);margin-bottom:1.5rem;min-height:24px}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--faint);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

.hint{font-size:11px;color:var(--faint);letter-spacing:1px;min-height:16px}

/* 오류 박스 */
.err-box{display:none;background:#1e1413;border:1px solid #3d2020;border-radius:12px;padding:1.25rem;font-size:13px;color:#c98080;line-height:1.9;margin-bottom:1.5rem}
.err-detail{font-size:11px;color:#8a4f4f;margin-top:.5rem;font-family:monospace;word-break:break-all}

/* 폴백 버튼들 */
.fallback-btns{display:flex;flex-direction:column;gap:8px;margin-top:1rem}
.fb-btn{padding:9px 16px;border-radius:10px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;font-weight:500;border:1px solid #3d2020;background:transparent;color:#c98080;text-decoration:none;display:block;transition:background .15s}
.fb-btn:hover{background:#2a1a1a}
.fb-btn.retry{border-color:var(--border);color:var(--muted)}
.fb-btn.retry:hover{background:#1e1c18}
</style>
</head>
<body>
<div class="wrap">
  <script>
    // ✏️ GAS URL
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxCIUMBHvu0YU77z4ULqrZAez6bue3cWi7Fzyg5slz-FdIY05K1EclHCRDUdcBoxXbPuQ/exec';
  </script>

  <span class="cap">🎓</span>
  <div class="name" id="nameEl"></div>
  <div class="cls"  id="clsEl"></div>

  <div class="waveform" id="wave">
    <div class="bar" style="animation-delay:.00s"></div>
    <div class="bar" style="animation-delay:.08s"></div>
    <div class="bar" style="animation-delay:.16s"></div>
    <div class="bar" style="animation-delay:.24s"></div>
    <div class="bar" style="animation-delay:.32s"></div>
    <div class="bar" style="animation-delay:.40s"></div>
    <div class="bar" style="animation-delay:.48s"></div>
    <div class="bar" style="animation-delay:.40s"></div>
    <div class="bar" style="animation-delay:.32s"></div>
    <div class="bar" style="animation-delay:.24s"></div>
    <div class="bar" style="animation-delay:.16s"></div>
    <div class="bar" style="animation-delay:.08s"></div>
    <div class="bar" style="animation-delay:.00s"></div>
  </div>

  <div class="loading" id="loadingMsg"></div>

  <div class="err-box" id="errBox">
    <div id="errText">음성을 불러올 수 없습니다.</div>
    <div class="err-detail" id="errDetail"></div>
    <div class="fallback-btns">
      <a class="fb-btn" id="driveBtn" href="#" target="_blank" style="display:none">Google Drive에서 직접 듣기 →</a>
      <button class="fb-btn retry" onclick="startLoad()">다시 시도</button>
    </div>
  </div>

  <button class="play-btn" id="playBtn" disabled onclick="togglePlay()">▶</button>
  <audio id="player"></audio>
  <div class="hint" id="hintMsg"></div>
</div>

<script>
  const p      = new URLSearchParams(location.search);
  const rowId  = p.get('id') || '';
  const fileId = p.get('f')  || '';   // Drive 직접 접근용 fallback

  const nameEl     = document.getElementById('nameEl');
  const clsEl      = document.getElementById('clsEl');
  const player     = document.getElementById('player');
  const wave       = document.getElementById('wave');
  const playBtn    = document.getElementById('playBtn');
  const loadingMsg = document.getElementById('loadingMsg');
  const errBox     = document.getElementById('errBox');
  const errText    = document.getElementById('errText');
  const errDetail  = document.getElementById('errDetail');
  const driveBtn   = document.getElementById('driveBtn');
  const hintMsg    = document.getElementById('hintMsg');

  if (!rowId && !fileId) {
    nameEl.textContent = '잘못된 QR코드입니다';
    clsEl.textContent  = '올바른 QR코드를 스캔해 주세요';
  } else {
    startLoad();
  }

  async function startLoad() {
    errBox.style.display  = 'none';
    playBtn.disabled      = true;
    nameEl.textContent    = '';
    clsEl.textContent     = '';
    hintMsg.textContent   = '';

    // ── STEP 1: 학생 정보 빠르게 로딩 (시트만 읽음)
    if (rowId) {
      setLoading('학생 정보를 불러오는 중…');
      try {
        const info = await xhrJson(GAS_URL + '?action=info&id=' + rowId);
        if (info.success) {
          nameEl.textContent = info.name + '의 졸업 메시지';
          clsEl.textContent  = info.className;
          // fileId가 QR에 없으면 info에서 가져옴
          if (!fileId && info.fileId) window._fileId = info.fileId;
        }
      } catch (_) {
        // 정보 로딩 실패 — 계속 진행
      }
    }

    // ── STEP 2: 음성 로딩 (GAS → Drive 순서로 시도)
    await loadAudio();
  }

  async function loadAudio() {
    const fid = fileId || window._fileId || '';

    // 2-A: GAS에서 base64로 받기
    if (rowId) {
      setLoading('음성을 불러오는 중… (최대 40초)');
      try {
        const data = await xhrJson(GAS_URL + '?action=play&id=' + rowId, 40000);
        if (data.success) {
          if (!nameEl.textContent) nameEl.textContent = data.name + '의 졸업 메시지';
          if (!clsEl.textContent)  clsEl.textContent  = data.className;

          const blob = base64ToBlob(data.data, data.mimeType);
          player.src = URL.createObjectURL(blob);
          onAudioReady();
          return;
        }
        throw new Error('[GAS] ' + (data.error || '알 수 없는 오류'));
      } catch (e1) {
        // GAS 실패 → Drive 직접 시도
        if (fid) {
          setLoading('다른 방법으로 시도 중…');
          try {
            await loadFromDrive(fid);
            return;
          } catch (e2) {
            showError('음성 로딩에 실패했습니다.', e1.message, fid);
          }
        } else {
          showError('음성 로딩에 실패했습니다.', e1.message, '');
        }
      }
    } else if (fid) {
      // rowId 없이 fileId만 있는 경우
      setLoading('음성을 불러오는 중…');
      try {
        await loadFromDrive(fid);
      } catch (e) {
        showError('음성 로딩에 실패했습니다.', e.message, fid);
      }
    }
  }

  function loadFromDrive(fid) {
    return new Promise((resolve, reject) => {
      // Drive 직접 스트리밍 시도
      const url = 'https://drive.google.com/uc?id=' + fid + '&export=download';
      player.src = url;
      const timer = setTimeout(() => {
        player.src = '';
        reject(new Error('[Drive] 시간 초과'));
      }, 10000);
      player.oncanplay = () => {
        clearTimeout(timer);
        onAudioReady();
        resolve();
      };
      player.onerror = () => {
        clearTimeout(timer);
        reject(new Error('[Drive] 파일 접근 불가'));
      };
    });
  }

  function onAudioReady() {
    setLoading('');
    playBtn.disabled = false;
    hintMsg.textContent = '버튼을 눌러 음성을 들어보세요';
    player.play().catch(() => {});
  }

  function togglePlay() {
    if (player.paused) { player.play(); }
    else { player.pause(); player.currentTime = 0; }
  }

  player.addEventListener('play',  () => { wave.className='waveform playing'; playBtn.textContent='■'; });
  player.addEventListener('pause', () => { wave.className='waveform'; playBtn.textContent='▶'; });
  player.addEventListener('ended', () => { wave.className='waveform'; playBtn.textContent='▶'; });

  // ── XHR 헬퍼 (fetch보다 모바일 호환성 높음)
  function xhrJson(url, timeout) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.timeout = timeout || 20000;
      xhr.onload = function() {
        try { resolve(JSON.parse(xhr.responseText)); }
        catch(e) { reject(new Error('응답 파싱 실패: ' + xhr.responseText.slice(0, 100))); }
      };
      xhr.onerror   = () => reject(new Error('네트워크 오류'));
      xhr.ontimeout = () => reject(new Error('서버 응답 시간 초과'));
      xhr.send();
    });
  }

  function base64ToBlob(b64, mime) {
    const binary = atob(b64);
    const bytes  = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new Blob([bytes], { type: mime });
  }

  function setLoading(msg) {
    loadingMsg.innerHTML = msg ? '<span class="spin"></span>' + msg : '';
  }

  function showError(msg, detail, fid) {
    setLoading('');
    errText.textContent   = msg;
    errDetail.textContent = detail || '';
    errBox.style.display  = 'block';
    if (fid) {
      driveBtn.href         = 'https://drive.google.com/file/d/' + fid + '/view';
      driveBtn.style.display = 'block';
    }
  }
</script>
</body>
</html>
